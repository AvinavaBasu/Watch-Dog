<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="utf-8">
  <title>Amazon.in</title>
</head>
<body>
  <div id="dp-container">
    <div id="titleSection">
      <h1 id="productTitle" class="a-size-large product-title-word-break">
        Casio Youth AE-1200WHL-5AVDF Digital Watch
      </h1>
    </div>
    <div id="corePrice_feature_div" class="celwidget">
      <span class="a-price aok-align-center">
        <span class="a-offscreen">₹4,495.00</span>
        <span class="a-price-whole">4,495</span>
        <span class="a-price-fraction">00</span>
      </span>
    </div>
    <div id="availability">
      <span id="availabilityInsideBlockFeature_feature_div" class="a-size-medium a-color-success">
        In stock
      </span>
    </div>
    <div id="addToCart_feature_div">
      <span id="submit.add-to-cart-announce">
        <input id="add-to-cart-button" type="submit" name="submit.add-to-cart" value="Add to Cart" class="a-button-input">
      </span>
      <span id="submit.buy-now-announce">
        <input id="buy-now-button" type="submit" name="submit.buy-now" value="Buy Now" class="a-button-input">
      </span>
    </div>
  </div>
</body>
</html>
